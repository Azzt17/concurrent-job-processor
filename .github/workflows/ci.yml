name: CI — Test, Race Detect & Security Audit

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-audit:
    name: Test & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # ── Pengujian Layer Pertama ────────────────────────────────────────
      - name: Run unit tests
        run: go test ./... -v -count=1

      - name: Run tests with Race Detector
        run: go test -race ./... -count=1

      # ── Analisis Statis & Kualitas Kode ─────────────────────────────────────
      - name: Run Staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: Run go vet
        run: go vet ./...

      # ── Audit Keamanan & Vulnerability (SAST) ─────────────────────────
      - name: Run GoSec (SAST)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt=sarif -out=gosec-results.sarif ./... || true
          gosec ./...

      - name: Upload GoSec SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec-results.sarif

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: test-and-audit

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        run: go build -v -o bin/processor ./cmd/processor/
